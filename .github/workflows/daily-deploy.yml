name: Daily SOG Fetch & Deploy

on:
  schedule:
    - cron: '0 15 * * 0,6'   # 10:00 AM ET (Sat & Sun) — early fetch for afternoon games
    - cron: '0 22 * * *'     # 5:00 PM ET (daily)      — full fetch & deploy
    - cron: '30 23 * * *'    # 6:30 PM ET (daily)      — goalie update & redeploy
    - cron: '30 16 * * 0,6'  # 11:30 AM ET (Sat & Sun) — goalie update for afternoon games
    - cron: '0 6 * * *'      # 1:00 AM ET (daily)      — settle picks & snapshots
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'fetch'
        type: choice
        options:
          - fetch
          - goalies
          - settle
          - both

jobs:
  # ============================================================
  # JOB 1: Full fetch + deploy
  # Runs at: 10 AM ET Sat/Sun + 5 PM ET daily
  # ============================================================
  fetch-and-deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 22 * * *' ||
        github.event.schedule == '0 15 * * 0,6'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.job == 'fetch' ||
        github.event.inputs.job == 'both'
      ))

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily fetch
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          VITE_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/daily-fetch.cjs

      - name: Save snapshot to Firestore
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          npm install firebase-admin --no-save
          node scripts/save-snapshot.cjs

      - name: Build app
        env:
          VITE_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm run build
          cp public/latest-analysis.json dist/latest-analysis.json
          echo "✅ Copied latest-analysis.json to dist/"

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools@latest deploy --only hosting --token "$FIREBASE_TOKEN" --project sog-edge-finder-ms --non-interactive

  # ============================================================
  # JOB 2: Goalie update + redeploy (6:30 PM ET daily)
  # ============================================================
  update-goalies:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '30 23 * * *' ||
        github.event.schedule == '30 16 * * 0,6'
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'goalies')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download latest analysis from Firebase
        run: |
          curl -o public/latest-analysis.json https://sog-edge-finder-ms.web.app/latest-analysis.json
          echo "✅ Downloaded latest-analysis.json ($(wc -c < public/latest-analysis.json) bytes)"

      - name: Run goalie updater
        run: node scripts/update-goalies.cjs

      - name: Build app
        env:
          VITE_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm run build
          cp public/latest-analysis.json dist/latest-analysis.json
          echo "✅ Copied updated analysis to dist/"

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools@latest deploy --only hosting --token "$FIREBASE_TOKEN" --project sog-edge-finder-ms --non-interactive

  # ============================================================
  # JOB 3: Nightly settler + snapshot settlement (1 AM ET)
  # ============================================================
  settle-picks:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'settle')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Run auto-settler
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node scripts/settle-picks.cjs
